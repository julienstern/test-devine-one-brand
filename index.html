<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Devine le Nouveau Nom !</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .emoji-header {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .countdown {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .predictions-section {
            margin-top: 30px;
            text-align: left;
        }

        .predictions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .predictions-title {
            color: #333;
            font-size: 1.2em;
        }

        .count-badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .predictions-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .prediction-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .prediction-name {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .prediction-meta {
            text-align: right;
        }

        .prediction-author {
            color: #667eea;
            font-weight: 500;
        }

        .prediction-time {
            color: #999;
            font-size: 0.85em;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 30px;
            text-align: center;
        }

        .clear-btn {
            background: #ff6b6b;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 14px;
        }

        .clear-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        @media (max-width: 500px) {
            .card {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="emoji-header">🔮✨</div>
            <h1>Zeplug change de nom !</h1>
            <p class="subtitle">Devine le nouveau nom avant l'annonce officielle</p>
            
            <div class="countdown" id="countdown">
                ⏰ Chargement...
            </div>

            <div class="input-group">
                <input type="text" id="authorInput" placeholder="Ton prénom">
                <input type="text" id="predictionInput" placeholder="Ta proposition de nom">
                <button onclick="submitPrediction()">🎯 Valider mon pronostic</button>
            </div>

            <div class="predictions-section">
                <div class="predictions-header">
                    <span class="predictions-title">📋 Tous les pronostics</span>
                    <span class="count-badge" id="countBadge">0 pronostic</span>
                </div>
                <div class="predictions-list" id="predictionsList">
                    <div class="empty-state">Aucun pronostic pour le moment. Sois le premier ! 🚀</div>
                </div>
            </div>

            <button class="clear-btn" onclick="clearAll()">🗑️ Réinitialiser</button>
        </div>
    </div>

    <script>
        // Date de l'annonce : mardi 26 mai 2026
        const revealDate = new Date('2026-05-26T09:00:00');

        // Charger les pronostics depuis localStorage
        function loadPredictions() {
            const stored = localStorage.getItem('zeplug_predictions');
            return stored ? JSON.parse(stored) : [];
        }

        // Sauvegarder les pronostics
        function savePredictions(predictions) {
            localStorage.setItem('zeplug_predictions', JSON.stringify(predictions));
        }

        // Afficher les pronostics
        function renderPredictions() {
            const predictions = loadPredictions();
            const list = document.getElementById('predictionsList');
            const badge = document.getElementById('countBadge');

            badge.textContent = `${predictions.length} pronostic${predictions.length > 1 ? 's' : ''}`;

            if (predictions.length === 0) {
                list.innerHTML = '<div class="empty-state">Aucun pronostic pour le moment. Sois le premier ! 🚀</div>';
                return;
            }

            list.innerHTML = predictions.map(p => `
                <div class="prediction-item">
                    <span class="prediction-name">${escapeHtml(p.name)}</span>
                    <div class="prediction-meta">
                        <div class="prediction-author">${escapeHtml(p.author)}</div>
                        <div class="prediction-time">${p.time}</div>
                    </div>
                </div>
            `).join('');
        }

        // Échapper le HTML pour éviter les injections
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Soumettre un pronostic
        function submitPrediction() {
            const authorInput = document.getElementById('authorInput');
            const predictionInput = document.getElementById('predictionInput');

            const author = authorInput.value.trim();
            const name = predictionInput.value.trim();

            if (!author) {
                alert('Entre ton prénom !');
                authorInput.focus();
                return;
            }

            if (!name) {
                alert('Entre ta proposition de nom !');
                predictionInput.focus();
                return;
            }

            const predictions = loadPredictions();
            
            predictions.unshift({
                author: author,
                name: name,
                time: new Date().toLocaleString('fr-FR', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            });

            savePredictions(predictions);
            renderPredictions();

            predictionInput.value = '';
            
            // Petit feedback visuel
            const btn = document.querySelector('button');
            btn.textContent = '✅ Ajouté !';
            setTimeout(() => {
                btn.textContent = '🎯 Valider mon pronostic';
            }, 1500);
        }

        // Réinitialiser tous les pronostics
        function clearAll() {
            if (confirm('Supprimer tous les pronostics ?')) {
                localStorage.removeItem('zeplug_predictions');
                renderPredictions();
            }
        }

        // Compte à rebours
        function updateCountdown() {
            const now = new Date();
            const diff = revealDate - now;

            if (diff <= 0) {
                document.getElementById('countdown').textContent = '🎉 L\'annonce est faite !';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            let text = '⏰ ';
            if (days > 0) text += `${days}j `;
            text += `${hours}h ${minutes}min avant l'annonce`;

            document.getElementById('countdown').textContent = text;
        }

        // Permettre la validation avec Entrée
        document.getElementById('predictionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitPrediction();
        });

        // Initialisation
        renderPredictions();
        updateCountdown();
        setInterval(updateCountdown, 60000);
    </script>
</body>
</html>
